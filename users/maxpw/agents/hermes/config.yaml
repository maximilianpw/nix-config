# Hermes Agent configuration (Nous Research).
#
# Managed declaratively via Nix — wired in users/maxpw/modules/agent-tools.nix.
# Hermes runs in "managed" mode (the ~/.hermes/.managed marker), so its
# interactive settings menu will NOT write back over this file; edit it here
# instead. It's an out-of-store symlink into the repo working copy, so changes
# apply without a rebuild.
#
# This file is deep-merged over Hermes' built-in DEFAULT_CONFIG, so only the
# keys we want to pin need to appear here — new upstream defaults are inherited
# automatically on version bumps.
#
# Secrets are NOT kept here. API keys and bot tokens (ANTHROPIC_API_KEY,
# DISCORD_BOT_TOKEN, SLACK_BOT_TOKEN, TELEGRAM_BOT_TOKEN, …) go in
# ~/.hermes/.env by hand. Runtime tool provisioning (`hermes tools`) downloads
# an impure browser engine into ~/.cache/ms-playwright/ and is outside Nix.

# Active model as provider/model (e.g. openai/gpt-5.5, anthropic/claude-sonnet-4).
# OpenAI/GPT runs on Hermes' base install; set OPENAI_API_KEY in ~/.hermes/.env.
model: openai/gpt-5.5
