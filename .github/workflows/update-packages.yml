name: Update packages

on:
  schedule:
    # Monday 07:00 UTC — picked to align with most upstream release cadences.
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      packages:
        description: 'Space-separated package names (default: all)'
        required: false
        default: 'helium obsidian t3code skills coderabbit'

concurrency:
  group: update-packages
  cancel-in-progress: false

jobs:
  update:
    name: Bump custom packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Run nix-update for each package
        id: bump
        run: |
          set -euo pipefail
          packages="${{ github.event.inputs.packages || 'helium obsidian t3code skills coderabbit' }}"
          failed=()
          for pkg in $packages; do
            echo "::group::nix-update $pkg"
            if nix run nixpkgs#nix-update -- --flake --use-update-script "$pkg"; then
              echo "ok: $pkg"
            else
              echo "failed: $pkg"
              failed+=("$pkg")
            fi
            echo "::endgroup::"
          done
          if [ "${#failed[@]}" -gt 0 ]; then
            echo "failed_packages=${failed[*]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automated/update-packages
          base: main
          commit-message: 'chore: bump custom packages'
          title: 'chore: bump custom packages'
          body: |
            Automated version bumps from `nix-update`, run by
            `.github/workflows/update-packages.yml`.

            CI builds the two NixOS configs (`main-pc`, `wsl`) on Linux
            runners, so a green check means the Linux package set still
            evaluates and builds. The Darwin config is **not** built in CI
            (no macOS runner), so macOS-only packages are unverified here —
            smoke-test them locally before merging.

            ${{ steps.bump.outputs.failed_packages && format('> [!WARNING]\n> Packages that failed to update: `{0}`', steps.bump.outputs.failed_packages) || '' }}
          delete-branch: true
