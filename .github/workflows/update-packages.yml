name: Update packages

on:
  schedule:
    # Sunday 16:00 UTC.
    - cron: '0 16 * * 0'
  workflow_dispatch:
    inputs:
      packages:
        description: 'Space-separated package names (default: all, see env.DEFAULT_PACKAGES)'
        required: false
        default: ''

concurrency:
  group: update-packages
  cancel-in-progress: false

env:
  # Single source of truth for the default package list (schedule + dispatch).
  # Only packages defined in this repo (packages/*.nix) — skills/hunkdiff come
  # from the llm-agents input and are bumped via `nix flake update llm-agents`.
  DEFAULT_PACKAGES: 'helium obsidian coderabbit cliproxyapi'

jobs:
  update:
    name: Bump custom packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false

      - name: Run nix-update for each package
        id: bump
        run: |
          set -euo pipefail
          packages="${{ github.event.inputs.packages || env.DEFAULT_PACKAGES }}"
          failed=()
          for pkg in $packages; do
            echo "::group::nix-update $pkg"
            if nix run .#nix-update -- --flake --use-update-script "$pkg"; then
              echo "ok: $pkg"
            else
              echo "failed: $pkg"
              failed+=("$pkg")
            fi
            echo "::endgroup::"
          done
          if [ "${#failed[@]}" -gt 0 ]; then
            echo "failed_packages=${failed[*]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: automated/update-packages
          base: main
          commit-message: 'chore: bump custom packages'
          title: 'chore: bump custom packages'
          body: |
            Automated version bumps from `nix-update`, run by
            `.github/workflows/update-packages.yml`.

            CI builds `main-pc`, produces the WSL import image, and builds the
            Darwin system on a macOS runner.

            ${{ steps.bump.outputs.failed_packages && format('> [!WARNING]\n> Packages that failed to update: `{0}`', steps.bump.outputs.failed_packages) || '' }}
          delete-branch: true
